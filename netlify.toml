[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "22"
  # CRA treats ESLint warnings as errors when CI=true (Netlify's default).
  # Keep warnings non-fatal so pre-existing lint warnings don't fail the build.
  CI = "false"
  # react-scripts 3.x uses webpack 4, which relies on an OpenSSL hash that was
  # removed in Node 17+. Without this flag the build fails on Node 22 with
  # ERR_OSSL_EVP_UNSUPPORTED. Remove it if react-scripts is upgraded to v5+.
  NODE_OPTIONS = "--openssl-legacy-provider"

# SPA fallback so client-side routes resolve to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
